<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <table>
        <caption>
            <h1>Student Registration Form</h1>
        </caption>
        <form>
            <tr>
                <td>
                    <label for="rollno">roll no. :</label>
                </td>
                <td>
                    <input type="text" id="rollno" name="rollno">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="studentname">student name :</label>
                </td>
                <td>
                    <input type="text" id="studentname" name="studentname" placeholder="first name"> -
                    <input type="text" id="studentname" name="studentname" placeholder="last name">
                </td>
            </tr>


            <tr>
                <td>
                    <label for="fathername">father's name :</label>
                </td>
                <td>
                    <input type="text" id="fathername" name="fathername">
                </td>
            </tr>


            <tr>
                <td>
                    <label for="dob">date of birth :</label>
                </td>
                <td>
                    <input type="date" id="dob" name="dob">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="mobileno.">mobile no. :</label>
                </td>
                <td>
                    <input type="number" id="mobile no." name="mobileno."> -
                    <input type="number" id="mobile no." name="mobileno.">
                </td>
            </tr>


            <tr>
                <td>
                    <label for="email">email id:</label>
                </td>
                <td>
                    <input type="email" id="email" name="email">
                </td>
            </tr>


            <tr>
                <td>
                    <label for="pass">password :</label>
                </td>
                <td>
                    <input type="password" id="password" name="pass">
                </td>
            </tr>


            <tr>
                <td>
                    <label for="gender">gender :</label>
                </td>
                <td>
                    <input type="radio" name="gender">male
                    <input type="radio" name="gender">female
                    <input type="radio" name="gender">others
                </td>
            </tr>

            <tr>
                <td>
                    <label for="dep">department :</label>
                </td>
                <td>
                    <input type="checkbox" name="gender" value="CSC">CSC
                    <input type="checkbox" name="gender" value="IT">IT
                    <input type="checkbox" name="gender" value="ECE">ECE
                    <input type="checkbox" name="gender" value="CIVIL">CIVIL
                    <input type="checkbox" name="gender" value="MECH">MECH
                </td>
            </tr>
            <tr>
                <td>
                    <select name="course">
                        <option disabled selected>--select course--</option>
                        <option value="web dev">web dev</option>
                        <option value="data analyts">data analyts</option>
                        <option value="cloud coumpting">cloud coumpting</option>
                        <option value="web design">web design</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td>
                    <label for="stu">student photo :</label>
                </td>
                <td>
                    <input type="file" accept="image/*">
                </td>
            </tr>

            <tr>
                <td>
                    <label for="stuaddress">address :</label>
                </td>
                <td>
                    <textarea name="address" id="address" cols="30" rows="5"></textarea>
                </td>

            </tr>

            <tr>
                <td>
                    <input type="submit" value="register">
                </td>
            </tr>

        </form>
    </table>
