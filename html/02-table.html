<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table</title>
</head>
<body>
    <table border="2" cellspacing="10" rowspacing="10" >

        <caption><h1>employee details</h1></caption>

        <thead>
        <tr>
            <th>name</th>
            <th>designation</th>
            <th>fav language</th>
        </tr>
        </thead>

        <tbody>
        <tr>
            <td>megha</td>
            <td>programmer</td>       
            <td>C++</td>
        </tr>
        <tr>
            <td colspan="2">nikhil</td>
            <td rowspan="2">javascript</td>
        </tr>
        <tr>
            <td>khushi</td>
            <td>programmer</td>  
        </tr>
        </tbody>

        <tfoot>
        <tr>
            <td colspan="2">mansi</td>
           <td rowspan="2">phython</td>
        </tr>
        </tfoot>

    </table>
</body>
</html>
