<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form>

        
        <label for="username">Username</label>
        <input type="text" id="username" name="username" >
        <!-- for & id - They connect the label to the input..for value must match the input’s id
          Without id + for: label is just text ..With them: label becomes clickable-->
         <!-- name - To send data to server.. With name → data is sent 
         <!-- value - It is the actual data sent to server .....(username-entered) -->
        <br><br>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <!-- When you click Email text, the cursor goes into the input box bcoz of for & id -->
         <!-- User types something.Browser automatically puts typed text into value.
         You don’t need to write value manually only for radio and checkbox & select -->
        <br><br>

        <label for="phnum">Phone no.</label>
        <input type="tel" id="phnum" name="phoneno.">
        <br><br>

        <label for="pass">Password</label>
        <input type="password" id="pass" name="password" >
        <br><br>

        <label for="gender">Gender</label>
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">Female
        <input type="radio" name="gender" value="others">Others
        <!-- Same name = one group..Only one option can be selected -->
        <br><br>

        <label for="hoobies">Hoobies</label>
        <input type="checkbox" name="hobbies" value="Reading">Reading
        <input type="checkbox" name="hobbies" value="painting">painting
        <input type="checkbox" name="hobbies" value="travelling">travelling
        <input type="checkbox" name="hobbies" value="cooking">cooking
        <br><br>

        <label for="Countries">Countries</label>
        <select name="Countries">
            <option disabled selected>--select country</option>
            <option value="usa">usa</option>
            <option value="australiya">australiya</option>
            <option value="india">india</option>
            <option value="japan">japan</option>
        </select>
        <br><br>

        <input type="submit" id="email">
        <br><br>
    </form>

</html>
